<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fiber Trench QC</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2ef;
        color: #1c2420;
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        width: min(680px, calc(100% - 32px));
      }

        margin-bottom: 8px;
      }

        color: #58665f;
        line-height: 1.5;
      }

        background: #fff;

  <body>
    <main>
      <h1>Fiber Trench QC</h1>
      <p>Backend is running. Submit trench photos plus a GeoJSON route to <code>POST /api/audit</code>, or use <code>scripts/run_batch.py</code> for batch processing.</p>
    </main>
  </body>
</html>
